name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node }}
          path: |
            vitest-report.xml
            coverage/
          if-no-files-found: ignore

  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check for secrets in source
        run: |
          # Match hardcoded credential values: quoted string value that contains alphanumeric 20+ chars
          # Excludes: placeholder text, env var references (${...}), function calls, examples
          FOUND=$(grep -rEn "(api[_-]?key|apikey|secret|password|passwd|token)\s*[:=]\s*['\"][A-Za-z0-9_\-]{20,}['\"]" src/ --include='*.ts' --include='*.tsx' | grep -v 'placeholder\|\.\.\.\|e\.g\.\|example\|requireValue\|process\.env\|\\${\|ENV_VAR\|SENTRY_MCP_TOKEN\|MINIMAX_API_KEY\|LINEAR_API_KEY\|OAUTH_CLIENT_ID\|OAUTH_CLIENT_SECRET\|MY_TOKEN\|envVar' || true)
          if [ -n "$FOUND" ]; then
            echo "⚠ Potential hardcoded secrets found:"
            echo "$FOUND"
            exit 1
          fi
          echo "✓ No hardcoded secrets detected"

      - name: Verify package.json
        run: |
          node -e "
          const pkg = require('./package.json');
          const required = ['name','version','description','main','types','bin','files','engines','keywords','license'];
          const missing = required.filter(k => !pkg[k]);
          if (missing.length) { console.error('Missing fields:', missing.join(', ')); process.exit(1); }
          if (!pkg.bin?.chorus) { console.error('Missing bin entry'); process.exit(1); }
          if (!pkg.files.includes('dist')) { console.error('Missing dist in files'); process.exit(1); }
          console.log('✓ package.json valid');
          "

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
